            color: #58a6ff;

        }

            font-size: 14px;
            font-family: inherit;
            transition: background 0.15s;
        }

        button:hover { background: #2ea043; }
        button:active { background: #1a7f37; }

        button.secondary {
            background: #21262d;
            border-color: #30363d;
            color: #c9d1d9;
        }

        /* ---- Summary bar ---- */
        #summary-bar {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 12px 24px;
            display: flex;
            gap: 24px;
            font-size: 14px;
            font-weight: 600;
        }

        #summary-bar .stat {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot.green { background: #3fb950; }
        .dot.red { background: #f85149; }
        .dot.yellow { background: #d29922; }
        .dot.gray { background: #484f58; }

            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        section {
            margin-bottom: 32px;
        }

        section h2 {
            font-size: 18px;
            color: #58a6ff;
            border-bottom: 1px solid #21262d;
            padding-bottom: 8px;
            margin-bottom: 16px;
        }

            border: 1px solid #30363d;
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
        }

            background: #1c2128;
            border-bottom: 1px solid #30363d;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;

            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;

        .suite-header .suite-status.fail { background: #4a1d1d; color: #f85149; }
        .suite-header .suite-status.pending { background: #2d2a1d; color: #d29922; }

        }

            border-bottom: 1px solid #21262d;
            font-size: 13px;
            display: flex;
            align-items: flex-start;
            gap: 10px;

            width: 16px;
            text-align: center;
            font-size: 14px;
            line-height: 1.6;

        .test-case.skip .icon { color: #d29922; }

            margin-top: 4px;
            font-family: 'Consolas', monospace;
            white-space: pre-wrap;
            word-break: break-all;

            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));

        .visual-box {

            border: 1px solid #30363d;
            border-radius: 8px;

            color: #8b949e;
            background: #1c2128;
            border-bottom: 1px solid #30363d;
            font-weight: 600;

// ========================================================================
// MINIMAL TEST FRAMEWORK
// ========================================================================

const TestFramework = (() => {
    let suites = [];
    let currentSuite = null;
    let counts = { pass: 0, fail: 0, skip: 0, total: 0 };

    function describe(name, fn) {
        currentSuite = { name, tests: [], passCount: 0, failCount: 0 };
        suites.push(currentSuite);
        fn();
        currentSuite = null;
    }

    function it(name, fn) {
        if (!currentSuite) throw new Error('it() must be called inside describe()');
        currentSuite.tests.push({ name, fn });
    }

    function assertEqual(actual, expected, message) {
        const actualStr = JSON.stringify(actual);
        const expectedStr = JSON.stringify(expected);
        if (actualStr !== expectedStr) {
            throw new Error(
                (message ? message + ': ' : '') +
                `Expected ${expectedStr}, got ${actualStr}`
            );
        }
    }

    function assertDeepEqual(actual, expected, message) {
        // Deep comparison via JSON serialization
        assertEqual(actual, expected, message);
    }

    function assertNotNull(value, message) {
        if (value === null || value === undefined) {
            throw new Error((message ? message + ': ' : '') + 'Expected non-null value');
        }
    }

    function assertNull(value, message) {
        if (value !== null && value !== undefined) {
            throw new Error(
                (message ? message + ': ' : '') +
                `Expected null, got ${JSON.stringify(value)}`
            );
        }
    }

    function assertTrue(value, message) {
        if (value !== true) {
            throw new Error(
                (message ? message + ': ' : '') +
                `Expected true, got ${JSON.stringify(value)}`
            );
        }
    }

    function assertFalse(value, message) {
        if (value !== false) {
            throw new Error(
                (message ? message + ': ' : '') +
                `Expected false, got ${JSON.stringify(value)}`
            );
        }
    }

    function assertThrows(fn, message) {
        let threw = false;
        try { fn(); } catch (e) { threw = true; }
        if (!threw) {
            throw new Error((message ? message + ': ' : '') + 'Expected function to throw');
        }
    }

    function assertArrayLength(arr, length, message) {
        if (!Array.isArray(arr)) {
            throw new Error((message ? message + ': ' : '') + `Expected array, got ${typeof arr}`);
        }
        if (arr.length !== length) {
            throw new Error(
                (message ? message + ': ' : '') +
                `Expected array length ${length}, got ${arr.length}`
            );
        }
    }

    function assertInstanceOf(value, type, message) {
        if (!(value instanceof type)) {
            throw new Error(
                (message ? message + ': ' : '') +
                `Expected instance of ${type.name}`
            );
        }
    }

    async function runAll() {
        counts = { pass: 0, fail: 0, skip: 0, total: 0 };
        const resultsEl = document.getElementById('test-results');
        resultsEl.innerHTML = '';

        for (const suite of suites) {
            suite.passCount = 0;
            suite.failCount = 0;

            const suiteEl = document.createElement('div');
            suiteEl.className = 'test-suite';

            const headerEl = document.createElement('div');
            headerEl.className = 'suite-header';
            headerEl.innerHTML = `<span>${suite.name}</span><span class="suite-status pending">running...</span>`;
            suiteEl.appendChild(headerEl);

            const bodyEl = document.createElement('div');
            bodyEl.className = 'suite-body';
            suiteEl.appendChild(bodyEl);

            headerEl.addEventListener('click', () => {
                bodyEl.classList.toggle('collapsed');
            });

            resultsEl.appendChild(suiteEl);

            for (const test of suite.tests) {
                counts.total++;
                const testEl = document.createElement('div');
                testEl.className = 'test-case';

                try {
                    // Support async test functions
                    const result = test.fn();
                    if (result && typeof result.then === 'function') {
                        await result;
                    }
                    testEl.classList.add('pass');
                    testEl.innerHTML = `<span class="icon">&#10003;</span><span class="name">${test.name}</span>`;
                    suite.passCount++;
                    counts.pass++;
                } catch (err) {
                    testEl.classList.add('fail');
                    testEl.innerHTML = `
                        <span class="icon">&#10007;</span>
                        <div>
                            <span class="name">${test.name}</span>
                            <div class="detail">${escapeHtml(err.message)}</div>
                        </div>`;
                    suite.failCount++;
                    counts.fail++;
                }

                bodyEl.appendChild(testEl);
            }

            // Update suite header status
            const statusEl = headerEl.querySelector('.suite-status');
            if (suite.failCount > 0) {
                statusEl.className = 'suite-status fail';
                statusEl.textContent = `${suite.failCount} failed, ${suite.passCount} passed`;
            } else {
                statusEl.className = 'suite-status pass';
                statusEl.textContent = `${suite.passCount} passed`;
                bodyEl.classList.add('collapsed');
            }
        }

        // Update summary counts
        document.getElementById('count-pass').textContent = counts.pass;
        document.getElementById('count-fail').textContent = counts.fail;
        document.getElementById('count-skip').textContent = counts.skip;
        document.getElementById('count-total').textContent = counts.total;
    }

    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function reset() {
        suites = [];
        currentSuite = null;
        counts = { pass: 0, fail: 0, skip: 0, total: 0 };
    }

    return {
        describe, it,
        assertEqual, assertDeepEqual, assertNotNull, assertNull,
        assertTrue, assertFalse, assertThrows, assertArrayLength,
        assertInstanceOf,
        runAll, reset
    };
})();

// Convenience aliases
const { describe, it, assertEqual, assertDeepEqual, assertNotNull, assertNull,

// ========================================================================
// TRANSCRIPT PARSER (Module Under Test)
// Implements the parsing logic from TECHNICAL_SPEC.md section 1.4
// ========================================================================

const TranscriptParser = {
    parse(jsonLine) {
        let record;
        try {
            record = JSON.parse(jsonLine);
        } catch {
            return null;
        }

        // Must be an object
        if (record === null || typeof record !== 'object' || Array.isArray(record)) {
            return null;
        }

        // Extract session metadata from any record
        const meta = record.slug
            ? { type: 'SESSION_META', slug: record.slug, sessionId: record.sessionId }
            : null;

        switch (record.type) {
            case 'user': return this.parseUserRecord(record) || meta;
            case 'assistant': return this.parseAssistantRecord(record) || meta;
            case 'progress': return this.parseProgressRecord(record);
            case 'system': return this.parseSystemRecord(record);
            default: return meta;
        }
    },

    parseUserRecord(record) {
        const content = record.message?.content;
        if (!content) return null;

        // Array content
        if (Array.isArray(content)) {
            // Check for tool results
            const toolResult = content.find(b => b.type === 'tool_result');
            if (toolResult) {
                return { type: 'TOOL_END', toolId: toolResult.tool_use_id };
            }
            // Check for text (user prompt)
            const textBlock = content.find(b => b.type === 'text');
            if (textBlock) {
                return { type: 'USER_PROMPT', text: textBlock.text };
            }
        }

        // String content (user prompt)
        if (typeof content === 'string' && content.trim()) {
            return { type: 'USER_PROMPT', text: content };
        }

        return null;
    },

    parseAssistantRecord(record) {
        const content = record.message?.content;
        if (!Array.isArray(content)) return null;

        const events = [];

        for (const block of content) {
            if (block.type === 'tool_use') {
                // Check for AskUserQuestion first (returns immediately)
                if (block.name === 'AskUserQuestion') {
                    return { type: 'ASK_USER', toolId: block.id };
                }

                // Check for sub-agent spawn
                if (block.name === 'Task' || block.name === 'Agent') {
                    const desc = block.input?.description || block.input?.prompt || '';
                    const agentId = block.input?.agentId || block.id;
                    events.push({
                        type: 'SUBAGENT_SPAWN',
                        agentId,
                        description: desc,
                        toolId: block.id
                    });
                }

                // General tool start
                events.push({
                    type: 'TOOL_START',
                    toolName: block.name,
                    toolId: block.id,
                    input: block.input
                });
            }
        }

        return events.length === 1 ? events[0] : events.length > 1 ? events : null;
    },

    parseProgressRecord(record) {
        if (record.data?.type === 'agent_progress') {
            const agentId = record.data.agentId;
            const msg = record.data.message;
            let toolName = null;

            if (msg?.message?.content) {
                const toolUse = (Array.isArray(msg.message.content)
                    ? msg.message.content : []).find(b => b.type === 'tool_use');
                if (toolUse) toolName = toolUse.name;
            }

            return { type: 'SUBAGENT_ACTIVITY', agentId, toolName };
        }
        return null;
    },

    parseSystemRecord(record) {
        if (record.subtype === 'turn_duration') {
            return { type: 'TURN_COMPLETE', durationMs: record.durationMs };
        }
        return null;
    }
};


// ========================================================================
// SESSION STATE (Module Under Test)
// Implements the state management from TECHNICAL_SPEC.md section 1.3
// ========================================================================

class SessionState {
    constructor(sessionId, fileHandle) {
        this.sessionId = sessionId || '';
        this.slug = '';
        this.fileHandle = fileHandle || null;
        this.fileOffset = 0;
        this.dirty = true;

        this.mainAgent = {
            state: 'idle',       // "idle" | "active" | "waiting"
            currentTool: null,   // string | null
            toolId: null,        // string | null
        };

        this.subAgents = new Map();

        this.humanActive = false;
        this.humanActiveTimer = null;

        this.lastUpdate = 0;
        this.isComplete = false;
    }

    handleEvent(event) {
        // Accept arrays of events (multi-tool parse output)
        if (Array.isArray(event)) {
            for (const e of event) {
                this.handleEvent(e);
            }
            return;
        }
        if (!event || !event.type) return;

        // Handle arrays of events (from multi-tool_use parsing)
        if (Array.isArray(event)) {
            for (const e of event) {
                this.handleEvent(e);
            }
            return;
        }

        switch (event.type) {
            case 'USER_PROMPT':
                this.humanActive = true;
                this.mainAgent.state = 'active';
                clearTimeout(this.humanActiveTimer);
                this.humanActiveTimer = setTimeout(() => {
                    this.humanActive = false;
                    this.dirty = true;
                }, 3000);
                break;

            case 'TOOL_START':
                this.mainAgent.state = 'active';
                this.mainAgent.currentTool = event.toolName;
                this.mainAgent.toolId = event.toolId;
                break;

            case 'TOOL_END':
                if (this.mainAgent.toolId === event.toolId) {
                    this.mainAgent.currentTool = null;
                    this.mainAgent.toolId = null;
                }
                break;

            case 'SUBAGENT_SPAWN':
                this.subAgents.set(event.agentId, {
                    state: 'active',
                    description: event.description || '',
                    lastTool: null,
                    spawnTime: Date.now()
                });
                break;

            case 'SUBAGENT_ACTIVITY': {
                const sub = this.subAgents.get(event.agentId);
                if (sub) {
                    sub.state = 'active';
                    sub.lastTool = event.toolName;
                }
                break;
            }

            case 'TURN_COMPLETE':
                this.mainAgent.state = 'idle';
                this.mainAgent.currentTool = null;
                break;

            case 'ASK_USER':
                this.mainAgent.state = 'waiting';
                break;

            case 'SESSION_META':
                if (event.slug) this.slug = event.slug;
                break;
        }

        this.dirty = true;
        this.lastUpdate = Date.now();
    }
}

            for (let x = 0; x < frame[y].length; x++) {
                const idx = frame[y][x];
                if (idx === 0) continue; // transparent
                ctx.fillStyle = palette[idx];
                ctx.fillRect(x, y, 1, 1);
            }
        }
    }

    getFrameCount(spriteName, animState) {
        const sprite = this.sprites[spriteName];
        if (!sprite || !sprite.frames[animState]) return 1;
        return sprite.frames[animState].length;
    }

    getFrameDuration(spriteName) {
        return 500; // 500ms per frame
    }

    draw(ctx, spriteName, animState, x, y, dt) {
        const key = `${spriteName}-${animState}`;
        let anim = this.animations.get(key);
        if (!anim) {
            anim = { frame: 0, elapsed: 0 };
            this.animations.set(key, anim);
        }

        anim.elapsed += dt;
        const frameDuration = this.getFrameDuration(spriteName);
        if (anim.elapsed >= frameDuration) {
            const frameCount = this.getFrameCount(spriteName, animState);
            anim.frame = (anim.frame + 1) % frameCount;
            anim.elapsed = 0;
        }

        const cached = this.cache.get(`${key}-${anim.frame}`);
        if (cached) {
            // Draw at 2x scale for pixel art crispness
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(cached, x, y, cached.width * 2, cached.height * 2);
        }
    }
}

// MINIMAL BOX RENDERER (for visual tests)
// Implements the rendering from TECHNICAL_SPEC.md section 1.5
// ========================================================================

class BoxRenderer {
    constructor(canvas, spriteEngine) {
        this.canvas = canvas;
        this.spriteEngine = spriteEngine;
        this.setupCanvas();
    }

    setupCanvas() {
        const dpr = window.devicePixelRatio || 1;
        this.canvas.width = 400 * dpr;
        this.canvas.height = 250 * dpr;
        this.canvas.style.width = '400px';
        this.canvas.style.height = '250px';
        const ctx = this.canvas.getContext('2d');
        ctx.scale(dpr, dpr);
    }

    render(session, dt) {
        const ctx = this.canvas.getContext('2d');

        // Reset transform for clearing
        const dpr = window.devicePixelRatio || 1;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        // 1. Clear and fill background
        ctx.fillStyle = '#1b6ca8';
        ctx.fillRect(0, 0, 400, 250);

        // 2. Draw border
        ctx.strokeStyle = '#0d4f7a';
        ctx.lineWidth = 2;
        ctx.strokeRect(1, 1, 398, 248);

        // 3. Draw human sprite (top-left)
        const humanFrame = session.humanActive ? 'active' : 'idle';
        this.spriteEngine.draw(ctx, 'human', humanFrame, 30, 15, dt);

        // 4. Draw main agent sprite (top-right)
        const agentFrame = session.mainAgent.state === 'active' ? 'active' : 'idle';
        this.spriteEngine.draw(ctx, 'main-agent', agentFrame, 280, 15, dt);

        // 5. Draw connection indicator
        this.drawConnection(ctx, session.mainAgent.state);

        // 6. Draw sub-agents (bottom row)
        let x = 20;
        const y = 140;
        for (const [agentId, sub] of session.subAgents) {
            const frame = sub.state === 'active' ? 'active' : 'idle';
            this.spriteEngine.draw(ctx, 'sub-agent', frame, x, y, dt);
            x += 50;
            if (x > 370) break;
        }

        // 7. Draw speech bubble if waiting
        if (session.mainAgent.state === 'waiting') {
            this.drawSpeechBubble(ctx, 280, 5, '?');
        }

        // 8. Draw status bar
        this.drawStatusBar(ctx, session);
    }

    drawConnection(ctx, state) {
        ctx.save();
        ctx.strokeStyle = state === 'active' ? '#00ff88' : '#4a6a7a';
        ctx.lineWidth = state === 'active' ? 2 : 1;
        ctx.setLineDash(state === 'active' ? [] : [4, 4]);
        ctx.beginPath();
        ctx.moveTo(75, 35);
        ctx.lineTo(278, 35);
        ctx.stroke();
        ctx.restore();
    }

    drawSpeechBubble(ctx, x, y, text) {
        ctx.save();
        // Bubble body
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.roundRect(x - 5, y - 5, 30, 22, 4);
        ctx.fill();
        ctx.strokeStyle = '#333333';
        ctx.lineWidth = 1;
        ctx.stroke();

        // Bubble tail
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.moveTo(x + 5, y + 17);
        ctx.lineTo(x + 10, y + 24);
        ctx.lineTo(x + 15, y + 17);
        ctx.fill();

        // Text
        ctx.fillStyle = '#333333';
        ctx.font = 'bold 14px monospace';
        ctx.fillText(text, x + 5, y + 12);
        ctx.restore();
    }

    drawStatusBar(ctx, session) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
        ctx.fillRect(0, 220, 400, 30);

        ctx.fillStyle = '#ffffff';
        ctx.font = '11px monospace';

        const slug = session.slug || session.sessionId.substring(0, 8);
        const tool = session.mainAgent.currentTool
            ? `Using ${session.mainAgent.currentTool}`
            : session.mainAgent.state;
        const subs = session.subAgents.size;

        ctx.fillText(`${slug} | ${tool} | ${subs} sub-agent(s)`, 10, 238);
    }
}

describe('SpriteEngine - Animation Frame Cycling', () => {

    it('SE.ANIM.01: Frame advances after duration elapsed', () => {
        const engine = new SpriteEngine();
        engine.init();
        // Reset animation state
        engine.animations.clear();

        const canvas = document.createElement('canvas');
        canvas.width = 100;
        canvas.height = 100;
        const ctx = canvas.getContext('2d');

        // First draw: frame 0
        engine.draw(ctx, 'main-agent', 'active', 0, 0, 0);
        const anim = engine.animations.get('main-agent-active');
        assertEqual(anim.frame, 0, 'should start at frame 0');

        // Draw with enough dt to advance (500ms frame duration)
        engine.draw(ctx, 'main-agent', 'active', 0, 0, 600);
        assertEqual(anim.frame, 1, 'should advance to frame 1');
    });

    it('SE.ANIM.02: Frame wraps to 0 after last frame', () => {
        const engine = new SpriteEngine();
        engine.init();
        engine.animations.clear();

        const canvas = document.createElement('canvas');
        canvas.width = 100;
        canvas.height = 100;
        const ctx = canvas.getContext('2d');

        const frameCount = engine.getFrameCount('main-agent', 'active');

        // Advance through exactly frameCount draws. Each draw call with
        // dt=600 > frameDuration=500 advances one frame. The first draw
        // creates the anim AND advances, so after frameCount draws we've
        // wrapped: with frameCount=2, frame goes 0->1->0.
        for (let i = 0; i < frameCount; i++) {
            engine.draw(ctx, 'main-agent', 'active', 0, 0, 600);
        }

        const anim = engine.animations.get('main-agent-active');
        assertEqual(anim.frame, 0, 'should wrap back to frame 0');
    });

    it('SE.ANIM.03: Frame does not advance if dt is too small', () => {
        const engine = new SpriteEngine();
        engine.init();
        engine.animations.clear();

        const canvas = document.createElement('canvas');
        canvas.width = 100;
        canvas.height = 100;
        const ctx = canvas.getContext('2d');

        engine.draw(ctx, 'human', 'idle', 0, 0, 1);
        const anim = engine.animations.get('human-idle');
        assertEqual(anim.frame, 0, 'frame should not advance with dt=1ms');
    });

    it('SE.ANIM.04: Different sprite/state combos have independent animation state', () => {
        const engine = new SpriteEngine();
        engine.init();
        engine.animations.clear();

        const canvas = document.createElement('canvas');
        canvas.width = 100;
        canvas.height = 100;
        const ctx = canvas.getContext('2d');

        // Advance human-active but not main-agent-idle
        engine.draw(ctx, 'human', 'active', 0, 0, 600);
        engine.draw(ctx, 'main-agent', 'idle', 0, 0, 1);

        const humanAnim = engine.animations.get('human-active');
        const agentAnim = engine.animations.get('main-agent-idle');

        // human-active has 2 frames, so after 600ms it should be at frame 1
        assertEqual(humanAnim.frame, 1, 'human-active should have advanced');
        assertEqual(agentAnim.frame, 0, 'main-agent-idle should not have advanced');
    });
});

function renderVisualTests() {
    const grid = document.getElementById('visual-grid');

    const scenarios = [
        {
            label: 'Idle Session (no sub-agents)',
            setup: (session) => {
                session.slug = 'idle-session';
                session.mainAgent.state = 'idle';
            }
        },
        {
            label: 'Active Session (using Read tool)',
            setup: (session) => {
                session.slug = 'active-session';
                session.mainAgent.state = 'active';
                session.mainAgent.currentTool = 'Read';
                session.humanActive = true;
            }
        },
        {
            label: 'Waiting for User Input (speech bubble)',
            setup: (session) => {
                session.slug = 'waiting-session';
                session.mainAgent.state = 'waiting';
            }
        },
        {
            label: 'Session with 3 Sub-Agents',
            setup: (session) => {
                session.slug = 'with-subagents';
                session.mainAgent.state = 'active';
                session.mainAgent.currentTool = 'Task';
                session.subAgents.set('a1', { state: 'active', description: 'Fix tests', lastTool: 'Bash', spawnTime: Date.now() });
                session.subAgents.set('a2', { state: 'active', description: 'Lint code', lastTool: 'Grep', spawnTime: Date.now() });
                session.subAgents.set('a3', { state: 'idle', description: 'Review', lastTool: null, spawnTime: Date.now() });
            }
        },
        {
            label: 'Session with 7 Sub-Agents (near overflow)',
            setup: (session) => {
                session.slug = 'many-subagents';
                session.mainAgent.state = 'active';
                session.mainAgent.currentTool = 'Task';
                for (let i = 0; i < 7; i++) {
                    session.subAgents.set(`a${i}`, {
                        state: i % 2 === 0 ? 'active' : 'idle',
                        description: `Task ${i}`,
                        lastTool: i % 2 === 0 ? 'Bash' : null,
                        spawnTime: Date.now()
                    });
                }
            }
        },
        {
            label: 'Active Human Typing',
            setup: (session) => {
                session.slug = 'human-typing';
                session.mainAgent.state = 'active';
                session.humanActive = true;
            }
        }
    ];

    // Animation loop for visual tests
    let animRunning = false;
    const renderers = [];

    for (const scenario of scenarios) {
        const box = document.createElement('div');
        box.className = 'visual-box';

        const label = document.createElement('div');
        label.className = 'box-label';
        label.textContent = scenario.label;
        box.appendChild(label);

        const canvas = document.createElement('canvas');
        box.appendChild(canvas);
        grid.appendChild(box);

        const renderer = new BoxRenderer(canvas, spriteEngine);
        const session = new SessionState('visual-' + scenario.label);
        scenario.setup(session);

        renderers.push({ renderer, session });
    }

    // Start animation loop
    if (!animRunning) {
        animRunning = true;
        let lastTimestamp = 0;

        function animate(timestamp) {
            const dt = lastTimestamp ? timestamp - lastTimestamp : 16;
            lastTimestamp = timestamp;

            for (const { renderer, session } of renderers) {
                renderer.render(session, dt);
            }

            if (animRunning) {
                requestAnimationFrame(animate);
            }
        }

        requestAnimationFrame(animate);
    }
}
